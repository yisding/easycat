name: Nightly Validation

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  full-local:
    name: Nightly Full Local
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VALIDATION_ARTIFACTS_DIR: .easycat/validation/nightly/${{ github.job }}-py3.12-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev --python 3.12
      - run: mkdir -p "$VALIDATION_ARTIFACTS_DIR"
      - run: uv run --python 3.12 pytest -q --junitxml="$VALIDATION_ARTIFACTS_DIR/junit.xml" --junit-prefix "nightly-full-local" -m "not integration_socket and not integration_live and not stress and not flaky"
      - name: Upload full local validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-report-full-local-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.VALIDATION_ARTIFACTS_DIR }}
          retention-days: 14

  quick:
    name: Nightly Quick
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VALIDATION_ARTIFACTS_DIR: .easycat/validation/nightly/${{ github.job }}-py3.12-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev --python 3.12
      - run: uv run --python 3.12 easycat validate quick --artifacts-dir "$VALIDATION_ARTIFACTS_DIR" --junit-prefix "nightly-quick"
      - name: Upload quick validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-report-quick-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.VALIDATION_ARTIFACTS_DIR }}
          retention-days: 14

  socket:
    name: Nightly Socket
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VALIDATION_ARTIFACTS_DIR: .easycat/validation/nightly/${{ github.job }}-py3.12-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev --python 3.12
      - run: uv run --python 3.12 easycat validate socket --artifacts-dir "$VALIDATION_ARTIFACTS_DIR" --junit-prefix "nightly-socket"
      - name: Upload socket validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-report-socket-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.VALIDATION_ARTIFACTS_DIR }}
          retention-days: 14

  stress:
    name: Nightly Stress
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VALIDATION_ARTIFACTS_DIR: .easycat/validation/nightly/${{ github.job }}-py3.12-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev --python 3.12
      - run: uv run --python 3.12 easycat validate stress --artifacts-dir "$VALIDATION_ARTIFACTS_DIR" --junit-prefix "nightly-stress"
      - name: Upload stress validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-report-stress-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.VALIDATION_ARTIFACTS_DIR }}
          retention-days: 14

  flaky-quarantine:
    name: Flaky Quarantine
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev --python 3.12
      - run: uv run --python 3.12 pytest --collect-only -q -m flaky

  live-canaries:
    name: Live Provider Canaries
    if: github.event_name != 'pull_request' && github.ref_protected == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: live-validation
    env:
      VALIDATION_ARTIFACTS_DIR: .easycat/validation/nightly/${{ github.job }}-py3.12-${{ github.run_id }}-${{ github.run_attempt }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Mask live provider secrets
        shell: bash
        run: |
          for value in "${OPENAI_API_KEY:-}" "${DEEPGRAM_API_KEY:-}" "${ELEVENLABS_API_KEY:-}" "${CARTESIA_API_KEY:-}"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done
      - run: uv sync --group dev --python 3.12
      - name: Run non-strict live provider canaries
        run: uv run --python 3.12 easycat validate live --provider openai --surface stt --surface tts --artifacts-dir "$VALIDATION_ARTIFACTS_DIR"
      - name: Upload redacted live validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-report-live-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.VALIDATION_ARTIFACTS_DIR }}
          retention-days: 14

  latency-placeholder:
    name: Latency Placeholder
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          echo "Latency validation is a placeholder until V2 lands."
          echo "Nightly latency prerequisites may skip in non-strict mode."
