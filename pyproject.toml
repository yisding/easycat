[project]
name = "easycat"
version = "0.1.0"
description = "Slim, batteries-included voice bot framework for the OpenAI Agents SDK"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.28.1",
    "pysbd>=0.3.4",
    "websockets>=16.0",
]

[project.optional-dependencies]
openai-agents = ["openai-agents>=0.0.7"]
pydantic-ai = ["pydantic-ai>=0.1"]
openai = ["openai>=1.0.0"]
deepgram = ["deepgram-sdk>=3.0.0"]
elevenlabs = ["elevenlabs>=1.0.0"]
telephony = ["fastapi>=0.110.0", "python-multipart>=0.0.9", "twilio>=9.0.0", "uvicorn>=0.29.0"]
local = ["sounddevice>=0.4.6"]
rnnoise = ["pyrnnoise>=0.3.0", "requests>=2.31.0"]
smart-turn = ["numpy>=1.24.0", "onnxruntime>=1.16.0", "transformers>=4.36.0"]
webrtc = ["aiortc>=1.9.0", "aiohttp>=3.9.0"]
all = [
    "aiortc>=1.9.0",
    "aiohttp>=3.9.0",
    "deepgram-sdk>=3.0.0",
    "elevenlabs>=1.0.0",
    "fastapi>=0.110.0",
    "openai>=1.0.0",
    "python-multipart>=0.0.9",
    "sounddevice>=0.4.6",
    "pyrnnoise>=0.3.0",
    "requests>=2.31.0",
    "twilio>=9.0.0",
    "uvicorn>=0.29.0",
    "torch>=2.2.0",
    "numpy>=1.24.0",
    "onnxruntime>=1.16.0",
    "transformers>=4.36.0",
]

[build-system]
requires = ["uv_build>=0.8.17,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=1.0",
    "ruff>=0.9",
]

[tool.ruff]
line-length = 99
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: tests requiring live API keys (skipped without credentials)",
]
