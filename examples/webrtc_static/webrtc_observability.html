<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EasyCat WebRTC + Debugger</title>
<style>
  html, body { margin: 0; height: 100%; background: #0c0f14; color: #e1e4eb;
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif; }
  body { display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: #161a22; border-bottom: 1px solid #232a37; height: 36px; }
  header h1 { margin: 0; font-size: 13px; font-weight: 600; color: #6ea8fe;
    letter-spacing: 0.02em; }
  header .hint { color: #7d8597; font-size: 11px;
    font-family: ui-monospace, "JetBrains Mono", "Fira Code", Menlo, monospace; }
  .panes { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  iframe { width: 100%; border: 0; display: block; }
  iframe.controls { height: 240px; background: #0c0f14;
    border-bottom: 2px solid #232a37; }
  iframe.debugger { flex: 1; background: #0c0f14; }
</style>
</head>
<body>
<header>
  <h1>EasyCat WebRTC + Live Debugger</h1>
  <span class="hint">talk to the bot up top — watch the journal below</span>
</header>
<div class="panes">
  <iframe class="controls" src="/webrtc_client.html"
    allow="microphone; autoplay" title="WebRTC client (mic + Start/Stop)"></iframe>
  <iframe class="debugger" id="debugger-frame" title="Debugger UI"></iframe>
</div>
<script>
  // Debugger runs on a separate port (default 8090). Point the iframe at the
  // same host the user opened this page on, swapping the port.
  //   ?debugger_port=NNNN  — override the port (matches DASHBOARD_PORT)
  //   ?debugger=URL        — override with a same-host or loopback http(s) URL
  // webrtc_observability_server.py prints a URL that already includes the
  // debugger_port query param, so the typical flow needs no manual editing.
  const params = new URLSearchParams(location.search);
  const override = params.get("debugger");
  const debuggerPort = params.get("debugger_port") || "8090";

  function isLoopbackHost(hostname) {
    return hostname === "localhost"
      || hostname === "127.0.0.1"
      || hostname === "[::1]";
  }

  function safeDebuggerUrl(value) {
    try {
      const parsed = new URL(value, location.href);
      const safeScheme = parsed.protocol === "http:" || parsed.protocol === "https:";
      const sameHost = parsed.hostname === location.hostname;
      const loopbackPair = isLoopbackHost(parsed.hostname)
        && isLoopbackHost(location.hostname);
      return safeScheme && (sameHost || loopbackPair) ? parsed.href : null;
    } catch {
      return null;
    }
  }

  function defaultDebuggerUrl() {
    const parsedPort = Number(debuggerPort);
    const port = Number.isInteger(parsedPort) && parsedPort > 0 && parsedPort <= 65535
      ? String(parsedPort)
      : "8090";
    return `${location.protocol}//${location.hostname}:${port}/`;
  }

  const fallbackUrl = defaultDebuggerUrl();
  const debuggerUrl = safeDebuggerUrl(override || fallbackUrl) || fallbackUrl;
  document.getElementById("debugger-frame").src = debuggerUrl;
</script>
</body>
</html>
