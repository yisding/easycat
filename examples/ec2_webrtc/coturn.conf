# coturn TURN server configuration for EasyCat WebRTC
#
# Place at /etc/turnserver.conf on your EC2 instance.
# The deploy.sh script does this automatically.
#
# Documentation: https://github.com/coturn/coturn/wiki/turnserver

# ── Network ──────────────────────────────────────────────────────

# Public IP of the EC2 instance (REPLACE with your actual IP).
# For EC2, use the Elastic IP or public IPv4.
external-ip=__EXTERNAL_IP__

# Listening port for TURN/STUN.
listening-port=3478

# TLS listening port (encrypted TURN — recommended for production).
tls-listening-port=5349

# Listen on all interfaces.
listening-ip=0.0.0.0

# Relay port range — make sure these are open in your EC2 security group.
min-port=49152
max-port=65535

# ── Authentication ───────────────────────────────────────────────

# Long-term credential mechanism (recommended for production).
lt-cred-mech

# Static user credentials.  For production, use a database or
# generate time-limited credentials via the TURN REST API.
user=easycat:__TURN_PASSWORD__

# Realm (use your domain name).
realm=easycat.example.com

# ── TLS (optional, recommended) ─────────────────────────────────

# Uncomment and point to your TLS certs for encrypted TURN (turns:).
# cert=/etc/letsencrypt/live/your-domain/fullchain.pem
# pkey=/etc/letsencrypt/live/your-domain/privkey.pem

# ── Logging ──────────────────────────────────────────────────────

log-file=/var/log/turnserver.log
verbose

# ── Security ─────────────────────────────────────────────────────

# Prevent relaying to private IP ranges (blocks relay to LAN).
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Limit per-user bandwidth (bytes/sec).  Adjust as needed.
max-bps=1000000

# ── Misc ─────────────────────────────────────────────────────────

fingerprint
